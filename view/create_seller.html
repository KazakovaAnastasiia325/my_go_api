<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание нового пользователя</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#090d16',
                        darkCard: '#111827',
                        darkBorder: '#1f2937',
                        accent: '#6366f1',
                    }
                }
            }
        }
    </script>
    
    <!-- Библиотека иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React, ReactDOM и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        }
        body {
            background-color: #090d16;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [role, setRole] = useState('seller');
            
            // Вспомогательные состояния интерфейса
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [notification, setNotification] = useState(null); // { type: 'success' | 'error', text: '' }

            // Обновление иконок Lucide после изменения состояния
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [showPassword, loading, notification]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setNotification(null);

                const data = { username, email, password, role };

                try {
                    const response = await fetch('/api/admin/create-user', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        setNotification({
                            type: 'success',
                            text: 'Пользователь успешно создан! Перенаправление...'
                        });
                        // Очистка формы
                        setUsername('');
                        setEmail('');
                        setPassword('');
                        
                        // Плавный переход обратно в панель администратора через 2 секунды
                        setTimeout(() => {
                            window.location.href = '/admin-dashboard';
                        }, 2000);
                    } else {
                        const errorText = await response.text();
                        throw new Error(errorText || 'Не удалось создать пользователя');
                    }
                } catch (err) {
                    console.error("Ошибка при отправке запроса:", err);
                    setNotification({
                        type: 'error',
                        text: err.message || 'Ошибка сети: Сервер не отвечает'
                    });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="bg-gray-900/40 backdrop-blur-xl border border-gray-800/80 p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                    
                    {/* Световые неоновые акценты на форме */}
                    <div className="absolute top-0 left-1/4 w-1/2 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent blur-sm"></div>
                    
                    <h2 className="text-2xl font-bold text-center tracking-tight bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 bg-clip-text text-transparent mb-2">
                        Новый пользователь
                    </h2>
                    <p className="text-sm text-slate-400 text-center mb-8 font-light">
                        Заполните учетные данные для регистрации в системе
                    </p>

                    {/* Вывод кастомных уведомлений (Тосты) */}
                    {notification && (
                        <div className={`p-4 rounded-xl mb-6 flex items-start gap-3 border text-sm ${
                            notification.type === 'success' 
                                ? 'bg-emerald-500/10 border-emerald-500/25 text-emerald-400' 
                                : 'bg-rose-500/10 border-rose-500/25 text-rose-400'
                        }`}>
                            <i data-lucide={notification.type === 'success' ? "check-circle" : "alert-triangle"} className="w-5 h-5 shrink-0 mt-0.5"></i>
                            <div>
                                <p className="font-semibold">{notification.type === 'success' ? 'Отлично!' : 'Внимание'}</p>
                                <p className="opacity-90">{notification.text}</p>
                            </div>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-5">
                        
                        {/* Поле Username */}
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Имя пользователя</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="user" className="w-5 h-5"></i>
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="Иван Иванов" 
                                    required
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:opacity-50"
                                />
                            </div>
                        </div>

                        {/* Поле Email */}
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email адрес</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="mail" className="w-5 h-5"></i>
                                </span>
                                <input 
                                    type="email" 
                                    placeholder="name@company.ru" 
                                    required
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:opacity-50"
                                />
                            </div>
                        </div>

                        {/* Поле Password */}
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Пароль</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                </span>
                                <input 
                                    type={showPassword ? "text" : "password"} 
                                    placeholder="••••••••" 
                                    required
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-11 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:opacity-50"
                                />
                                <button 
                                    type="button"
                                    onClick={() => setShowPassword(!showPassword)}
                                    className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-500 hover:text-slate-300 focus:outline-none"
                                >
                                    <i data-lucide={showPassword ? "eye-off" : "eye"} className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>

                        {/* Выбор роли */}
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Назначить роль</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="shield" className="w-5 h-5"></i>
                                </span>
                                <select 
                                    value={role}
                                    onChange={(e) => setRole(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 appearance-none disabled:opacity-50 cursor-pointer"
                                >
                                    <option value="seller" className="bg-gray-950 text-slate-200">Продавец (Seller)</option>
                                    <option value="admin" className="bg-gray-950 text-slate-200">Администратор (Admin)</option>
                                    <option value="customer" className="bg-gray-950 text-slate-200">Покупатель (Customer)</option>
                                </select>
                                <span className="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                </span>
                            </div>
                        </div>

                        {/* Кнопка отправки формы */}
                        <button 
                            type="submit" 
                            disabled={loading}
                            className="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 active:translate-y-0.5 disabled:opacity-50"
                        >
                            {loading ? (
                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                            ) : (
                                <React.Fragment>
                                    <i data-lucide="user-plus" className="w-5 h-5"></i>
                                    <span>Создать аккаунт</span>
                                </React.Fragment>
                            )}
                        </button>
                    </form>

                    {/* Ссылка Назад */}
                    <div className="mt-8 pt-6 border-t border-gray-800/60 text-center">
                        <a 
                            href="/admin-dashboard" 
                            className="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-slate-200 hover:underline"
                        >
                            <i data-lucide="arrow-left" className="w-4 h-4"></i>
                            Вернуться в панель управления
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
