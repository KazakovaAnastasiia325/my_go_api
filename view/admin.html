<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора — Управление Пользователями</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#090d16',
                        darkCard: '#111827',
                        darkBorder: '#1f2937',
                        accent: '#6366f1',
                    }
                }
            }
        }
    </script>
    
    <!-- Библиотека иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React, ReactDOM и Babel для компиляции прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Плавные переходы для интерактивных элементов */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        }
        body {
            background-color: #090d16;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }
        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
    </style>
</head>
<body class="text-slate-100 antialiased min-h-screen">

    <div id="root"></div>

    <!-- Указываем type="text/babel", чтобы браузер понял React-код -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Демо-данные, если бэкенд не ответит
        const MOCK_USERS = [
            { id: 1, username: "alex_director", email: "alex@admin.corp", role: "admin" },
            { id: 2, username: "maria_sales", email: "m.seller@shop.ru", role: "seller" },
            { id: 3, username: "dmitry_green", email: "dima@customer.io", role: "customer" },
            { id: 4, username: "elena_soft", email: "elena@seller.net", role: "seller" },
            { id: 5, username: "pavel_prime", email: "pavel@customer.io", role: "customer" },
            { id: 6, username: "anna_chief", email: "anna.c@corp.com", role: "admin" }
        ];

        function App() {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [roleFilter, setRoleFilter] = useState('all');
            const [isMocked, setIsMocked] = useState(false);
            const [error, setError] = useState(null);

            // Загрузка данных из вашей БД PostgreSQL
            useEffect(() => {
                async function fetchUsers() {
                    try {
                        setLoading(true);
                        const response = await fetch('/api/admin/users');
                        if (!response.ok) throw new Error('Ошибка сервера при получении данных');
                        const data = await response.json();
                        setUsers(data);
                        setIsMocked(false);
                    } catch (err) {
                        console.warn("API недоступно. Используем демо-данные:", err);
                        setUsers(MOCK_USERS);
                        setIsMocked(true);
                        setError("Используются демо-данные (сервер API не ответил)");
                    } finally {
                        setLoading(false);
                    }
                }
                fetchUsers();
            }, []);

            // Перерисовка иконок Lucide при каждом обновлении интерфейса
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Подсчет статистики
            const stats = useMemo(() => {
                return {
                    total: users.length,
                    admins: users.filter(u => (u.role || u.Role || '').toLowerCase() === 'admin').length,
                    sellers: users.filter(u => (u.role || u.Role || '').toLowerCase() === 'seller').length,
                    customers: users.filter(u => (u.role || u.Role || '').toLowerCase() === 'customer').length,
                };
            }, [users]);

            // Фильтрация
            const filteredUsers = useMemo(() => {
                return users.filter(user => {
                    const uName = (user.username || user.Username || '').toLowerCase();
                    const uEmail = (user.email || user.Email || '').toLowerCase();
                    const uRole = (user.role || user.Role || '').toLowerCase();
                    
                    const matchesSearch = uName.includes(searchTerm.toLowerCase()) || uEmail.includes(searchTerm.toLowerCase());
                    const matchesRole = roleFilter === 'all' || uRole === roleFilter;

                    return matchesSearch && matchesRole;
                });
            }, [users, searchTerm, roleFilter]);

            // Получение стилей для ролей
            const getRoleBadgeClass = (role) => {
                const normRole = (role || '').toLowerCase();
                switch (normRole) {
                    case 'admin':
                        return 'bg-rose-500/10 text-rose-400 border border-rose-500/20';
                    case 'seller':
                        return 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
                    case 'customer':
                        return 'bg-blue-500/10 text-blue-400 border border-blue-500/20';
                    default:
                        return 'bg-slate-500/10 text-slate-400 border border-slate-500/20';
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                    
                    {/* Хедер */}
                    <header className="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-10 pb-6 border-b border-gray-800">
                        <div>
                            <div className="flex items-center gap-3">
                                <h1 className="text-3xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                                    Панель Администратора
                                </h1>
                                {isMocked && (
                                    <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20 animate-pulse">
                                        Demo Mode
                                    </span>
                                )}
                            </div>
                            <p className="text-slate-400 mt-1">Централизованное управление учетными записями и ролями пользователей.</p>
                        </div>
                        
                        <a 
                            href="/create-seller-page" 
                            className="inline-flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-semibold px-5 py-3 rounded-xl shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 hover:-translate-y-0.5"
                        >
                            <i data-lucide="user-plus" className="w-5 h-5"></i>
                            Новый пользователь
                        </a>
                    </header>

                    {/* Виджеты статистики */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <div className="bg-gray-900/40 backdrop-blur-md border border-gray-800 p-5 rounded-2xl flex items-center justify-between">
                            <div>
                                <p className="text-sm text-slate-400 font-medium">Всего в базе</p>
                                <h3 className="text-2xl font-bold text-white mt-1">{loading ? '...' : stats.total}</h3>
                            </div>
                            <div className="w-12 h-12 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400">
                                <i data-lucide="users" className="w-6 h-6"></i>
                            </div>
                        </div>

                        <div className="bg-gray-900/40 backdrop-blur-md border border-gray-800 p-5 rounded-2xl flex items-center justify-between">
                            <div>
                                <p className="text-sm text-slate-400 font-medium">Администраторы</p>
                                <h3 className="text-2xl font-bold text-rose-400 mt-1">{loading ? '...' : stats.admins}</h3>
                            </div>
                            <div className="w-12 h-12 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-400">
                                <i data-lucide="shield-alert" className="w-6 h-6"></i>
                            </div>
                        </div>

                        <div className="bg-gray-900/40 backdrop-blur-md border border-gray-800 p-5 rounded-2xl flex items-center justify-between">
                            <div>
                                <p className="text-sm text-slate-400 font-medium">Продавцы</p>
                                <h3 className="text-2xl font-bold text-emerald-400 mt-1">{loading ? '...' : stats.sellers}</h3>
                            </div>
                            <div className="w-12 h-12 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400">
                                <i data-lucide="store" className="w-6 h-6"></i>
                            </div>
                        </div>

                        <div className="bg-gray-900/40 backdrop-blur-md border border-gray-800 p-5 rounded-2xl flex items-center justify-between">
                            <div>
                                <p className="text-sm text-slate-400 font-medium">Клиенты</p>
                                <h3 className="text-2xl font-bold text-blue-400 mt-1">{loading ? '...' : stats.customers}</h3>
                            </div>
                            <div className="w-12 h-12 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-blue-400">
                                <i data-lucide="shopping-bag" className="w-6 h-6"></i>
                            </div>
                        </div>
                    </div>

                    {/* Поиск и фильтры */}
                    <div className="bg-gray-900/50 border border-gray-800 p-4 rounded-2xl mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="relative flex-1 max-w-md">
                            <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                <i data-lucide="search" className="w-5 h-5"></i>
                            </span>
                            <input 
                                type="text"
                                placeholder="Поиск по имени или email..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-4 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                            />
                        </div>

                        {/* Переключатели ролей без обратных кавычек в атрибутах для устранения ошибок VS Code */}
                        <div className="flex items-center gap-2">
                            <span className="text-sm text-slate-400 font-medium hidden sm:inline">Роль:</span>
                            <div className="flex bg-slate-950/60 p-1 rounded-xl border border-gray-800">
                                <button 
                                    onClick={() => setRoleFilter('all')}
                                    className={roleFilter === 'all' ? "px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-indigo-500 text-white shadow" : "px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200"}
                                >
                                    Все
                                </button>
                                <button 
                                    onClick={() => setRoleFilter('admin')}
                                    className={roleFilter === 'admin' ? "px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-rose-500/20 text-rose-400 border border-rose-500/30" : "px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-rose-400"}
                                >
                                    Admin
                                </button>
                                <button 
                                    onClick={() => setRoleFilter('seller')}
                                    className={roleFilter === 'seller' ? "px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-emerald-500/20 text-emerald-400 border border-emerald-500/30" : "px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-emerald-400"}
                                >
                                    Seller
                                </button>
                                <button 
                                    onClick={() => setRoleFilter('customer')}
                                    className={roleFilter === 'customer' ? "px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-blue-500/20 text-blue-400 border border-blue-500/30" : "px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-blue-400"}
                                >
                                    Customer
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Главная таблица */}
                    <div className="bg-gray-900/30 border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-gray-800 bg-gray-950/40">
                                        <th className="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400">ID</th>
                                        <th className="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400">Имя пользователя</th>
                                        <th className="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400">Email-адрес</th>
                                        <th className="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-center">Роль</th>
                                        <th className="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right">Действия</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-800/60">
                                    {loading ? (
                                        Array(4).fill(0).map((_, idx) => (
                                            <tr key={idx} className="animate-pulse">
                                                <td className="py-5 px-6"><div className="h-4 w-8 bg-gray-800 rounded"></div></td>
                                                <td className="py-5 px-6"><div className="h-4 w-32 bg-gray-800 rounded"></div></td>
                                                <td className="py-5 px-6"><div className="h-4 w-48 bg-gray-800 rounded"></div></td>
                                                <td className="py-5 px-6 text-center"><div className="h-6 w-20 bg-gray-800 rounded-full mx-auto"></div></td>
                                                <td className="py-5 px-6 text-right"><div className="h-8 w-16 bg-gray-800 rounded ml-auto"></div></td>
                                            </tr>
                                        ))
                                    ) : filteredUsers.length > 0 ? (
                                        filteredUsers.map(user => {
                                            const id = user.id || user.ID;
                                            const username = user.username || user.Username;
                                            const email = user.email || user.Email;
                                            const role = user.role || user.Role;
                                            
                                            return (
                                                <tr key={id} className="hover:bg-slate-900/40 transition-colors group">
                                                    <td className="py-4 px-6 text-slate-400 font-mono text-sm">#{id}</td>
                                                    <td className="py-4 px-6 font-semibold text-slate-200">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-300 group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                                                                {username ? username.charAt(0).toUpperCase() : '?'}
                                                            </div>
                                                            <span>{username}</span>
                                                        </div>
                                                    </td>
                                                    <td className="py-4 px-6 text-slate-300">
                                                        <span className="inline-flex items-center gap-1.5">
                                                            <i data-lucide="mail" className="w-4 h-4 text-slate-500"></i>
                                                            {email}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-6 text-center">
                                                        <span className={"inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider " + getRoleBadgeClass(role)}>
                                                            {role}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-6 text-right">
                                                        <div className="inline-flex gap-2">
                                                            <button title="Редактировать" className="p-2 text-slate-400 hover:text-indigo-400 hover:bg-slate-800 rounded-lg transition-all">
                                                                <i data-lucide="edit" className="w-4 h-4"></i>
                                                            </button>
                                                            <button title="Удалить" className="p-2 text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-all">
                                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    ) : (
                                        <tr>
                                            <td colSpan="5" className="py-12 text-center text-slate-500">
                                                <div className="flex flex-col items-center justify-center gap-3">
                                                    <i data-lucide="folder-open" className="w-10 h-10 text-slate-600"></i>
                                                    <p className="text-base font-medium">Пользователи с такими параметрами не найдены</p>
                                                    <button 
                                                        onClick={() => { setSearchTerm(''); setRoleFilter('all'); }} 
                                                        className="text-sm text-indigo-400 hover:underline"
                                                    >
                                                        Сбросить фильтры
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Демо-баннер */}
                    {isMocked && (
                        <div className="mt-6 p-4 bg-amber-500/10 border border-amber-500/25 rounded-2xl flex items-start gap-3">
                            <i data-lucide="alert-circle" className="w-5 h-5 text-amber-400 shrink-0 mt-0.5"></i>
                            <div>
                                <h4 className="text-sm font-semibold text-amber-300">Внимание: Демонстрационный режим</h4>
                                <p className="text-xs text-amber-400/80 mt-1">
                                    Ваш бэкенд недоступен по адресу <code className="bg-amber-950/80 px-1 rounded font-mono">/api/admin/users</code>. 
                                    Приложение использует демо-данные, чтобы вы могли оценить интерфейс. Как только вы запустите свой Node.js/Python/Go сервер, React автоматически подтянет ваши реальные данные из PostgreSQL.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
