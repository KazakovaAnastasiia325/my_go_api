<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h2>Секунду, настраиваем ваш личный кабинет...</h2>
    </div>

    <script>
        
        const role = localStorage.getItem('role');
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/auth-page';
        } else {
            //навигация
            switch (role) {
                case 'admin':
                    window.location.href = '/admin-dashboard';
                    break;
                case 'seller':
                    window.location.href = '/seller-dashboard';
                    break;
                case 'customer':
                    window.location.href = '/catalog';
                    break;
                default:
                    window.location.href = '/catalog';
                    break;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/auth-page';
        }
    </script>
</body>
</html>
