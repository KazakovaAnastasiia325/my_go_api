<!DOCTYPE html>
<html>
<body>
    <div class="container">
    <h2>Вход пользователя</h2>
    <form id="authForm">
        <input type="text" id="username" placeholder="Имя" required><br><br>
        <input type="password" id="password" placeholder="Пароль" required><br><br>
        <button type="submit">Войти</button>
        <a href="reg.html">Нет аккаунта? Зарегистрироваться</a>
    </form>
    </div>
    <style>
    :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: var(--card);
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    h2 { margin-bottom: 1.5rem; font-weight: 600; }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 1rem;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        background: #0f172a;
        color: white;
        box-sizing: border-box; /* Чтобы паддинги не раздували инпут */
    }

    button {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        border: none;
        border-radius: 0.5rem;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #4f46e5; transform: translateY(-2px); }

    a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-top: 1rem; display: block; }
</style>
    <script>
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            const response = await fetch('http://localhost:8080/authenticate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                const result = await response.json();
                localStorage.setItem('token', result.token);
                localStorage.setItem('username', result.username);                
                window.location.href = 'welcome.html?username=' + encodeURIComponent(data.username);
            } else {
                alert('Ошибка при входе');
            }
        });
    </script>
</body>
</html>
