<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberMart — Вход в систему</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Библиотека иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React, ReactDOM и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        }
        body {
            background-color: #090d16;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [showPassword, loading, error]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);

                const data = { username, password };

                try {
                    const response = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        
                        // Сохраняем авторизационные данные
                        localStorage.setItem('token', result.token);
                        localStorage.setItem('role', result.role); 

                        // ИСПРАВЛЕНО: Приводим роль к нижнему регистру для безопасного сопоставления роутов
                        const normRole = (result.role || '').toLowerCase();

                        const routes = {
                            'admin': '/admin-dashboard',
                            'seller': '/seller-dashboard',
                            'customer': '/customer-dashboard'
                        };

                        // Перенаправляем пользователя на нужный роут или на общую страницу приветствия
                        window.location.href = routes[normRole] || '/welcome-page';
                    } else {
                        throw new Error('Неверное имя пользователя или пароль');
                    }
                } catch (err) {
                    console.error("Ошибка при входе:", err);
                    setError(err.message || 'Ошибка сети: Сервер не отвечает.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="bg-gray-900/40 backdrop-blur-xl border border-gray-800/80 p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                    
                    {/* Световые неоновые акценты */}
                    <div className="absolute top-0 left-1/4 w-1/2 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent blur-sm"></div>
                    
                    {/* Логотип */}
                    <div className="flex justify-center mb-6">
                        <div className="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-pink-500 flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-indigo-500/20 animate-pulse">
                            C
                        </div>
                    </div>

                    <h2 className="text-2xl font-bold text-center tracking-tight bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 bg-clip-text text-transparent mb-2">
                        Авторизация
                    </h2>
                    <p className="text-sm text-slate-400 text-center mb-8 font-light">
                        Войдите, чтобы продолжить работу в CyberMart
                    </p>

                    {/* Вывод ошибки */}
                    {error && (
                        <div className="p-4 rounded-xl mb-6 flex items-start gap-3 border bg-rose-500/10 border-rose-500/25 text-rose-400 text-sm">
                            <i data-lucide="alert-triangle" className="w-5 h-5 shrink-0 mt-0.5 animate-bounce"></i>
                            <p className="font-medium">{error}</p>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-5">
                        
                        {/* Поле Username */}
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Имя пользователя</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="user" className="w-5 h-5"></i>
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="Введите имя" 
                                    required
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:opacity-50"
                                />
                            </div>
                        </div>

                        {/* Поле Password */}
                        <div>
                            <div className="flex justify-between items-center mb-2">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Пароль</label>
                            </div>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                                    <i data-lucide="lock" className="w-5 h-5"></i>
                                </span>
                                <input 
                                    type={showPassword ? "text" : "password"} 
                                    placeholder="••••••••" 
                                    required
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    disabled={loading}
                                    className="w-full bg-slate-950/60 border border-gray-800 rounded-xl pl-11 pr-11 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:opacity-50"
                                />
                                <button 
                                    type="button"
                                    onClick={() => setShowPassword(!showPassword)}
                                    className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-500 hover:text-slate-300 focus:outline-none"
                                >
                                    <i data-lucide={showPassword ? "eye-off" : "eye"} className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>

                        {/* Кнопка отправки формы */}
                        <button 
                            type="submit" 
                            disabled={loading}
                            className="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 active:translate-y-0.5 disabled:opacity-50"
                        >
                            {loading ? (
                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                            ) : (
                                <React.Fragment>
                                    <i data-lucide="log-in" className="w-5 h-5"></i>
                                    <span>Войти в систему</span>
                                </React.Fragment>
                            )}
                        </button>
                    </form>

                    {/* Ссылка на регистрацию */}
                    <div className="mt-8 pt-6 border-t border-gray-800/60 text-center">
                        <span className="text-sm text-slate-400 font-light">Нет аккаунта? </span>
                        <a 
                            href="/register-page" 
                            className="text-sm text-indigo-400 hover:text-indigo-300 hover:underline font-semibold"
                        >
                            Зарегистрироваться
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
