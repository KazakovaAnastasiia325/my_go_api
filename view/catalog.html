<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberMart — Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #090d16; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);

            // Загрузка товаров
            useEffect(() => {
                fetch('/api/catalog')
                    .then(res => res.json())
                    .then(data => setProducts(data || []))
                    .catch(err => console.error("Ошибка загрузки:", err));
            }, []);

            // Иконки
            useEffect(() => { lucide.createIcons(); }, [products, isCartOpen]);

            const addToCart = (p) => {
                setCart(prev => [...prev, p]);
            };

            return (
                <div className="min-h-screen">
                    {/* Шапка: Только логотип и корзина */}
                    <nav className="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900/50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold">C</div>
                            <span className="text-xl font-bold">CyberMart</span>
                        </div>
                        
                        <button onClick={() => setIsCartOpen(true)} className="relative p-2 bg-gray-800 rounded-xl">
                            <i data-lucide="shopping-cart"></i>
                            {cart.length > 0 && (
                                <span className="absolute -top-1 -right-1 bg-pink-500 text-[10px] w-5 h-5 rounded-full flex items-center justify-center">
                                    {cart.length}
                                </span>
                            )}
                        </button>
                    </nav>

                    {/* Сетка товаров */}
                    <main className="p-6 max-w-6xl mx-auto">
                        <h1 className="text-2xl font-bold mb-8">Каталог товаров</h1>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {products.length === 0 ? (
                                <p className="text-gray-500">Товаров пока нет...</p>
                            ) : (
                                products.map(p => (
                                    <div key={p.ID} className="bg-gray-900 border border-gray-800 p-4 rounded-2xl">
                                        <h3 className="font-bold text-lg">{p.Name}</h3>
                                        <p className="text-gray-400 text-sm my-2">{p.Description}</p>
                                        <div className="flex justify-between items-center mt-4">
                                            <span className="text-indigo-400 font-bold">{p.Price} ₸</span>
                                            <button 
                                                onClick={() => addToCart(p)}
                                                className="bg-indigo-600 p-2 rounded-lg hover:bg-indigo-500"
                                            >
                                                <i data-lucide="plus" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </main>

                    {/* Простая корзина */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/80 flex justify-end z-50">
                            <div className="w-full max-w-md bg-gray-900 p-6 shadow-2xl">
                                <div className="flex justify-between mb-6">
                                    <h2 className="text-xl font-bold">Корзина</h2>
                                    <button onClick={() => setIsCartOpen(false)}><i data-lucide="x"></i></button>
                                </div>
                                {cart.map((item, idx) => (
                                    <div key={idx} className="border-b border-gray-800 py-2 flex justify-between">
                                        <span>{item.Name}</span>
                                        <span className="font-bold">{item.Price} ₸</span>
                                    </div>
                                ))}
                                <button className="w-full bg-indigo-600 py-3 rounded-xl mt-6 font-bold">Оплатить</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
